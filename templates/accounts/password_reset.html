{% extends "base.html" %}
{% block title %}Reset Password – IGF Sadhana Tracker{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="text-center mb-4">
      <div style="font-size:3rem;">🌸</div>
      <h1 style="font-size:1.6rem;font-weight:700;color:var(--pink-dark);">Reset Password</h1>
      <p style="color:var(--text-muted);font-size:.85rem;">Enter your email to receive a reset link</p>
    </div>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label fw-600" style="font-size:.85rem;">Email</label>
        {{ form.email }}
      </div>
      <button type="submit" class="btn-pink w-100 justify-content-center" style="font-size:1rem;padding:.8rem;">
        Send Reset Link
      </button>
    </form>
    <p class="text-center mt-3" style="font-size:.8rem;">
      <a href="{% url 'login' %}">Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
