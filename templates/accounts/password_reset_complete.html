{% extends "base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="login-page">

    <div style="font-size:3rem;">✅</div>

    <a href="{% url 'login' %}" class="btn-pink mt-3">Sign In</a>
  </div>
</div>
{% endblock %}
